name: Veille Orthodontique Hebdomadaire
on:
  schedule:
    - cron: '0 7 * * 3'
  workflow_dispatch:
jobs:
  envoyer-rapport:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Envoyer email
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        shell: python
        run: |
          import smtplib, os
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          from email.mime.base import MIMEBase
          from email import encoders
          from datetime import date
          with open('output/veille_orthodontie_2024_2025.md', 'r', encoding='utf-8') as f:
              contenu = f.read()
          msg = MIMEMultipart()
          msg['From'] = 'drpierrerouquette@gmail.com'
          msg['To'] = 'drpierrerouquette@gmail.com'
          msg['Subject'] = 'Veille Orthodontique Reuni Smiles ' + date.today().strftime('%d/%m/%Y')
          msg.attach(MIMEText('Bonjour Pierre,\n\nVeille orthodontique en piece jointe.\n\nVotre agent Claude', 'plain', 'utf-8'))
          att = MIMEBase('application', 'octet-stream')
          att.set_payload(contenu.encode('utf-8'))
          encoders.encode_base64(att)
          att.add_header('Content-Disposition', 'attachment; filename=veille.md')
          msg.attach(att)
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as smtp:
              smtp.login('drpierrerouquette@gmail.com', os.environ['GMAIL_PASSWORD'])
              smtp.send_message(msg)
              print('OK')
